<div class="login-container">
  <div class="login-card">
    <div class="scan-line"></div>

    <h1 class="glitch-text stagger-element">STOPGAMES ACCESS</h1>
    <p class="stagger-element">Solo personal autorizado</p>

    <div class="form-group stagger-element">
      <label>ID DE USUARIO</label>
      <input [(ngModel)]="email" type="email" placeholder="admin@tienda.com">
    </div>

    <div class="form-group stagger-element">
      <label>CLAVE DE ACCESO</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••">
    </div>

    <button #loginBtn class="btn-login stagger-element" (click)="iniciarSesion()">
      INICIAR SESIÓN
    </button>
    
    <a href="/" class="back-link stagger-element">← Volver a la Tienda</a>
  </div>
</div>
